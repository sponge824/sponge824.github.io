# ==============================================================================
# Chirpy Jekyll Theme - _config.yml
# Cybersecurity Portfolio Setup
# Docs: https://github.com/cotes2333/jekyll-theme-chirpy
# ==============================================================================

# ---------------------------------------------------------------------------
# 1. SITE BASICS
# ---------------------------------------------------------------------------
lang: en
timezone: Asia/Kuala_Lumpur        # Your timezone

title: YourAlias                   # Your name / handle shown in the header
tagline: CTF Player · Security Researcher   # Subtitle under your name

description: >-
  Personal cybersecurity portfolio featuring CTF writeups,
  HackTheBox and TryHackMe walkthroughs, and security research notes.

url: "https://sponge824.github.io"  # ← Replace with YOUR GitHub username

# ---------------------------------------------------------------------------
# 2. AVATAR & SOCIAL
# ---------------------------------------------------------------------------
avatar: /assets/img/avatar.png     # Place your photo at this path

github:
  username: sponge824   # ← Your GitHub username

twitter:
  username:                        # Optional: Twitter/X handle (without @)

social:
  name: YourAlias                  # Your display name for SEO
  email: your@email.com            # Optional
  links:
    - https://github.com/your-github-username
    - https://app.hackthebox.com/profile/YOUR_ID    # Optional: HTB profile
    - https://tryhackme.com/p/yourusername          # Optional: THM profile

# ---------------------------------------------------------------------------
# 3. THEME APPEARANCE
# ---------------------------------------------------------------------------
theme_mode:   # leave blank to follow system, or set: [light | dark]

# ---------------------------------------------------------------------------
# 4. NAVIGATION SIDEBAR LINKS
# These appear as tabs in the left sidebar
# ---------------------------------------------------------------------------
# Default tabs are: Home, Categories, Tags, Archives, About
# You can add custom tabs by creating files in _tabs/

# ---------------------------------------------------------------------------
# 5. POST SETTINGS
# ---------------------------------------------------------------------------
paginate: 10                       # Posts per page

permalink: /posts/:title/          # URL structure for posts

# Show table of contents on posts (great for long writeups)
toc: true

# Show edit-on-github link (set false if repo is private)
# github_edit:
#   enabled: false

# ---------------------------------------------------------------------------
# 6. COMMENTS (Optional — pick one)
# ---------------------------------------------------------------------------
comments:
  active:        # Options: disqus | utterances | giscus | ""
  # --- Disqus ---
  disqus:
    shortname:   # Your Disqus shortname
  # --- Utterances (GitHub Issues-based, recommended) ---
  utterances:
    repo:        # e.g. your-username/your-username.github.io
    issue_term:  pathname
  # --- Giscus (GitHub Discussions-based) ---
  giscus:
    repo:
    repo_id:
    category:
    category_id:

# ---------------------------------------------------------------------------
# 7. ANALYTICS (Optional)
# ---------------------------------------------------------------------------
google_analytics:
  id:            # e.g. G-XXXXXXXXXX (from Google Analytics)

# ---------------------------------------------------------------------------
# 8. SEO & SHARING
# ---------------------------------------------------------------------------
google_site_verification:          # From Google Search Console (optional)

# Open Graph image (shown when sharing posts on social media)
# og_image: /assets/img/og-preview.png

# ---------------------------------------------------------------------------
# 9. CDN & ASSETS (Leave defaults unless you have custom CDN)
# ---------------------------------------------------------------------------
# img_cdn: ""

# ---------------------------------------------------------------------------
# 10. JEKYLL BUILD SETTINGS (Do not change unless you know what you're doing)
# ---------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true           # Show line numbers in code blocks ✓

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
